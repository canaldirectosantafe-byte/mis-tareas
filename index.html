<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Tareas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,Palatino,serif;background:#F0F2F8;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
.header{background:linear-gradient(135deg,#1A202C,#2D3748);padding:24px 20px 0}
.header-inner{max-width:720px;margin:0 auto}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.header-label{color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:3px}
h1{color:#fff;font-size:22px;font-weight:700}
.header-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.status-ok{color:rgba(255,255,255,0.3);font-size:11px}
.btn-config{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);border-radius:8px;padding:5px 10px;font-size:12px}
.btn-config.connected{background:rgba(72,187,120,0.2);border-color:rgba(72,187,120,0.4);color:#9AE6B4}
.notif-badge{background:#E53E3E;color:#fff;border-radius:20px;padding:5px 10px;font-size:12px;font-weight:700}
.nav{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;margin-bottom:6px}
.nav::-webkit-scrollbar{display:none}
.nav-tab{white-space:nowrap;padding:10px 18px;border-radius:10px 10px 0 0;border:none;font-size:13px;font-weight:500;transition:all 0.18s;border-bottom:3px solid transparent}
.nav-tab.active{background:#F0F2F8;font-weight:700}
.nav-tab:not(.active){background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.55)}
.tabs{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;padding:10px 16px;border-radius:10px 10px 0 0;border:none;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.55);font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;transition:all 0.18s;border-bottom:3px solid transparent}
.tab.active{background:#F0F2F8;font-weight:700}
.tab-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);flex-shrink:0}
.tab.active .tab-dot{background:currentColor}
.tab-count{color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.tab-add{padding:10px 14px;border-radius:10px 10px 0 0;border:none;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.35);font-size:20px;line-height:1}
.body{max-width:720px;margin:0 auto;padding:18px 16px 40px}
/* Dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
@media(max-width:500px){.dash-grid{grid-template-columns:1fr}}
.stat-card{border-radius:14px;padding:18px;text-align:center;border:2px solid}
.stat-num{font-size:36px;font-weight:700;margin-bottom:4px}
.stat-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;opacity:0.7}
/* Hotel filter bar */
.hotel-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.hotel-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid #E2E8F0;background:transparent;color:#718096;transition:all 0.15s}
.hotel-btn.active{background:#2D3748;border-color:#2D3748;color:#fff}
.dash-section{margin-bottom:22px}
.dash-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.dash-section-title span{display:inline-block;width:3px;height:14px;border-radius:2px}
.dash-task{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:10px 14px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.dash-task-left{flex:1;min-width:0}
.dash-task-name{font-size:13px;font-weight:600;color:#1A202C;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-task-meta{font-size:11px;color:#718096;display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px}
.dash-task-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.dash-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;border:1px solid}
.dash-empty{text-align:center;padding:20px;color:#A0AEC0;font-size:13px;background:#fff;border-radius:10px;border:1px dashed #E2E8F0}
.proj-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.proj-card{background:#fff;border-radius:12px;padding:14px 16px;border:2px solid;display:flex;align-items:center;gap:12px}
.proj-color-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0}
.proj-name{font-size:13px;font-weight:700;color:#2D3748;margin-bottom:2px}
.proj-counts{font-size:11px;color:#718096}
/* Forms */
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;border:2px solid #E2E8F0;box-shadow:0 4px 16px rgba(0,0,0,0.07)}
.card-title{font-weight:700;color:#2D3748;font-size:14px;margin-bottom:12px}
.input{width:100%;padding:9px 13px;border-radius:9px;border:1.5px solid #E2E8F0;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}
.input-sm{padding:7px 12px;font-size:13px;border-radius:8px;border:1.5px solid #E2E8F0;font-family:inherit;outline:none;color:#2D3748}
.input-notes{color:#666;font-size:13px}
.label{font-size:12px;color:#718096;font-weight:600;display:block;margin-bottom:5px}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.color-dot{width:26px;height:26px;border-radius:50%;border:3px solid transparent}
.color-dot.selected{border-color:#2D3748}
.priority-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.priority-btn{padding:5px 10px;border-radius:7px;border:2px solid;font-size:11px;font-weight:700}
.btn-row{display:flex;gap:8px}
.btn-primary{flex:1;padding:10px;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700}
.btn-secondary{padding:10px 14px;background:#F7F8FC;border:1.5px solid #E2E8F0;border-radius:9px;font-size:13px;color:#666}
.btn-danger{padding:5px 10px;border-radius:8px;font-size:11px;background:transparent;color:#FC8181;border:1.5px solid #FED7D7}
/* Tags UI */
.tags-section{margin-bottom:12px}
.tags-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tag-chip{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;border:1.5px solid;cursor:pointer;transition:all 0.15s}
.tag-chip.selected{background:#2D3748;border-color:#2D3748;color:#fff}
.tag-chip:not(.selected){background:transparent;border-color:#CBD5E0;color:#718096}
.tag-pill{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:#EDF2FF;border:1px solid #C3DAFE;color:#3730A3;display:inline-flex;align-items:center;gap:4px}
.tag-pill-remove{cursor:pointer;opacity:0.6;font-size:13px;line-height:1}
/* Toolbar */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.toolbar-left{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;border:1.5px solid #E2E8F0;background:transparent;color:#718096}
/* Task cards */
.task-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:13px 15px;margin-bottom:8px;display:flex;gap:11px;align-items:flex-start;box-shadow:0 1px 6px rgba(0,0,0,0.04);transition:all 0.2s}
.task-card.done{background:#FAFAFA;box-shadow:none;opacity:0.6}
.task-checkbox{width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:2px;border:2px solid;background:transparent;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:12px}
.task-checkbox.checked{background:#48BB78;border-color:#48BB78;color:#fff}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:600;color:#1A202C;line-height:1.3;margin-bottom:4px}
.task-title.done{color:#A0AEC0;text-decoration:line-through}
.task-notes{font-size:12px;color:#718096;line-height:1.4;margin-bottom:6px}
.task-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.task-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.priority-badge{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;border:1px solid}
.deadline-badge{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;border:1px solid}
.task-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.btn-icon{background:none;border:none;font-size:14px;color:#A0AEC0;padding:0;line-height:1}
.btn-delete{background:none;border:none;font-size:18px;color:#CBD5E0;padding:0;line-height:1}
.btn-add-task{width:100%;margin-top:8px;padding:14px;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700}
.priority-wrapper{position:relative}
.priority-dropdown{position:absolute;top:100%;left:0;margin-top:4px;background:#fff;border:1px solid #E2E8F0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:100;overflow:hidden;min-width:130px;display:none}
.priority-option{display:block;width:100%;padding:9px 14px;text-align:left;border:none;background:transparent;font-size:13px;font-weight:600}
/* Toasts */
.toasts{position:fixed;top:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:8px;max-width:300px}
.toast{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 8px 32px rgba(0,0,0,0.15);display:flex;gap:10px;align-items:flex-start;border:2px solid}
.toast-close{background:none;border:none;color:#CBD5E0;font-size:18px;padding:0;line-height:1}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:90vh;overflow-y:auto}
.empty{text-align:center;padding:48px 24px;color:#A0AEC0;font-size:15px}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:15px;color:#718096;flex-direction:column;gap:12px}
</style>
</head>
<body>
<div id="app"><div class="loading"><div style="font-size:32px">📋</div><p>Conectando con Supabase…</p></div></div>
<div class="toasts" id="toasts"></div>

<script>
const SUPABASE_URL="https://mnmijirutugernuwiyhd.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ubWlqaXJ1dHVnZXJudXdpeWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDI1NDksImV4cCI6MjA5MzcxODU0OX0.LRN4sRpZzaStl9HvGmifBUjN9jKN1Kf7TQP_adN5u5U";

const PRIORITIES=[
  {id:"urgent",label:"Urgente",emoji:"🔴",color:"#E53E3E",bg:"#FFF5F5",border:"#FEB2B2",order:1},
  {id:"high",  label:"Alta",   emoji:"🟠",color:"#DD6B20",bg:"#FFFAF0",border:"#FBD38D",order:2},
  {id:"medium",label:"Media",  emoji:"🟡",color:"#B7791F",bg:"#FFFFF0",border:"#FAF089",order:3},
  {id:"low",   label:"Baja",   emoji:"🟢",color:"#276749",bg:"#F0FFF4",border:"#9AE6B4",order:4},
];
const PROJECT_COLORS=["#6B46C1","#2B6CB0","#276749","#C05621","#97266D","#2C7A7B","#744210","#1A365D"];

let state={
  projects:[],tasks:[],tags:[],taskTags:{}, // taskTags: {taskId: [tagId,...]}
  activeProject:null,
  view:"dashboard",
  taskFilter:"pending",
  hotelFilter:null, // tag id or null = all
  showTaskForm:false,showProjForm:false,showEditProj:null,
  showEditTask:null,showConfig:false,showTagManager:false,
  newTask:{title:"",priority:"medium",notes:"",deadline:"",tagIds:[]},
  newProj:{name:"",color:PROJECT_COLORS[0]},
  editProj:{name:"",color:PROJECT_COLORS[0]},
  editTask:{title:"",priority:"medium",notes:"",deadline:"",tagIds:[]},
  newTagName:"",
  tgToken:localStorage.getItem("tg-token")||"",
  tgChatId:localStorage.getItem("tg-chatid")||"",
  notifications:[],shownNotifs:new Set(),
};

// ── Supabase helpers ──────────────────────────────────────────────────────────
const headers={apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"};
async function sbGet(table,q=""){const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${q}&order=id.asc`,{headers});return r.json();}
async function sbInsert(table,data){const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:"POST",headers:{...headers,Prefer:"return=representation"},body:JSON.stringify(data)});const j=await r.json();return Array.isArray(j)?j[0]:j;}
async function sbUpdate(table,id,data){await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`,{method:"PATCH",headers,body:JSON.stringify(data)});}
async function sbDelete(table,id){await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`,{method:"DELETE",headers});}
async function sbDeleteWhere(table,col,val){await fetch(`${SUPABASE_URL}/rest/v1/${table}?${col}=eq.${val}`,{method:"DELETE",headers});}
async function sbInsertMany(table,rows){if(!rows.length)return;await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:"POST",headers,body:JSON.stringify(rows)});}

// ── Helpers ───────────────────────────────────────────────────────────────────
const proj=id=>state.projects.find(x=>x.id===id);
const tag=id=>state.tags.find(x=>x.id===id);
function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d+"T23:59:00")-new Date())/86400000);}
function dlLabel(d){
  if(!d)return null;const n=daysUntil(d);
  if(n<0)  return{text:"Vencida",   color:"#E53E3E",urgent:true};
  if(n===0)return{text:"Hoy",        color:"#E53E3E",urgent:true};
  if(n===1)return{text:"Mañana",     color:"#DD6B20",urgent:true};
  if(n<=3) return{text:`En ${n} días`,color:"#B7791F",urgent:false};
  return       {text:`En ${n} días`, color:"#718096",urgent:false};
}
function fmtDate(d){if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;}
function taskMatchesHotel(task){
  if(!state.hotelFilter)return true;
  const tids=state.taskTags[task.id]||[];
  return tids.includes(state.hotelFilter);
}

async function sendTelegram(text){
  if(!state.tgToken||!state.tgChatId)return;
  try{await fetch(`https://api.telegram.org/bot${state.tgToken}/sendMessage`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:state.tgChatId,text})});}catch{}
}
function checkDeadlines(){
  state.tasks.filter(t=>!t.done&&t.deadline).forEach(t=>{
    const d=daysUntil(t.deadline);
    if(d!==null&&d<=1){
      const key=`${t.id}-${d}`;
      if(!state.shownNotifs.has(key)){
        state.shownNotifs.add(key);
        const p=proj(t.project_id);
        const label=d<0?"¡Tarea vencida!":d===0?"¡Vence hoy!":"¡Vence mañana!";
        state.notifications.push({id:Date.now()+Math.random(),taskTitle:t.title,project:p?.name||"",label,color:d<=0?"#E53E3E":"#DD6B20"});
        sendTelegram(`⏰ ${label}\n📌 ${t.title}\n📁 ${p?.name||""}`);
      }
    }
  });
  renderToasts();
}

// ── Computed ──────────────────────────────────────────────────────────────────
function getProjectTasks(){
  const{tasks,activeProject,taskFilter}=state;
  return tasks.filter(t=>{
    if(t.project_id!==activeProject)return false;
    if(!taskMatchesHotel(t))return false;
    if(taskFilter==="done")   return t.done;
    if(taskFilter==="overdue")return !t.done&&t.deadline&&daysUntil(t.deadline)<0;
    return !t.done&&!(t.deadline&&daysUntil(t.deadline)<0);
  }).sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    return(PRIORITIES.find(x=>x.id===a.priority)?.order||9)-(PRIORITIES.find(x=>x.id===b.priority)?.order||9);
  });
}
const pendingCount=pid=>state.tasks.filter(t=>t.project_id===pid&&!t.done&&!(t.deadline&&daysUntil(t.deadline)<0)&&taskMatchesHotel(t)).length;
const overdueCount=pid=>state.tasks.filter(t=>t.project_id===pid&&!t.done&&t.deadline&&daysUntil(t.deadline)<0&&taskMatchesHotel(t)).length;
const urgentCount =pid=>state.tasks.filter(t=>t.project_id===pid&&!t.done&&t.priority==="urgent"&&taskMatchesHotel(t)).length;
const doneCount   =pid=>state.tasks.filter(t=>t.project_id===pid&&t.done&&taskMatchesHotel(t)).length;

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const{projects,view,taskFilter,hotelFilter,tags}=state;
  const ap=proj(state.activeProject);
  const tgOk=state.tgToken&&state.tgChatId;
  const allTasks=state.tasks.filter(t=>taskMatchesHotel(t));
  const totalOverdue=allTasks.filter(t=>!t.done&&t.deadline&&daysUntil(t.deadline)<0).length;

  document.getElementById("app").innerHTML=`
    ${state.showConfig?configModal():""}
    ${state.showTagManager?tagManagerModal():""}

    <div class="header">
      <div class="header-inner">
        <div class="header-top">
          <div>
            <div class="header-label">Panel de trabajo</div>
            <h1>Mis Proyectos</h1>
          </div>
          <div class="header-actions">
            <span class="status-ok">✅ Supabase</span>
            <button class="btn-config" data-action="opentagmgr" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.5)">🏷 Hoteles</button>
            <button class="btn-config ${tgOk?"connected":""}" data-action="openconfig">${tgOk?"✈️ Telegram ✓":"⚙️ Configurar"}</button>
            ${state.notifications.length>0?`<div class="notif-badge">🔔 ${state.notifications.length}</div>`:""}
          </div>
        </div>

        <div class="nav">
          <button class="nav-tab ${view==="dashboard"?"active":""}" style="${view==="dashboard"?"color:#F6AD55;border-bottom-color:#F6AD55":""}" data-view="dashboard">
            📊 Dashboard ${totalOverdue>0?`<span style="background:#E53E3E;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px">${totalOverdue}</span>`:""}
          </button>
          <button class="nav-tab ${view==="tasks"?"active":""}" style="${view==="tasks"?"color:#6B46C1;border-bottom-color:#6B46C1":""}" data-view="tasks">
            📋 Tareas
          </button>
        </div>

        ${view==="tasks"?`
        <div class="tabs" style="margin-top:6px">
          ${projects.map(p=>{
            const cnt=pendingCount(p.id),urg=urgentCount(p.id),active=p.id===state.activeProject;
            return`<button class="tab ${active?"active":""}" style="color:${active?p.color:"rgba(255,255,255,0.55)"}" data-project="${p.id}">
              <span class="tab-dot"></span>${p.name}
              ${cnt>0?`<span class="tab-count" style="background:${urg>0?"#E53E3E":p.color}">${cnt}</span>`:""}
              ${overdueCount(p.id)>0?`<span class="tab-count" style="background:#E53E3E">${overdueCount(p.id)}⚠</span>`:""}
              ${active?`<span style="font-size:12px;opacity:0.6" data-editproj="${p.id}">✏️</span>`:""}
            </button>`;
          }).join("")}
          <button class="tab-add" data-action="newproj">+</button>
        </div>`:""}
      </div>
    </div>

    <div class="body">
      ${hotelFilterBar()}
      ${view==="dashboard"?renderDashboard():renderTasks(ap)}
    </div>
  `;
}

function hotelFilterBar(){
  const{tags,hotelFilter}=state;
  if(!tags.length)return"";
  return`<div class="hotel-bar">
    <span style="font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:1px">Filtrar por hotel:</span>
    <button class="hotel-btn ${!hotelFilter?"active":""}" data-hotelfilter="0">Todos</button>
    ${tags.map(t=>`<button class="hotel-btn ${hotelFilter===t.id?"active":""}" data-hotelfilter="${t.id}">${t.name}</button>`).join("")}
  </div>`;
}

function renderCharts(filtered){
  const{projects,tags,taskTags}=state;

  // ── Chart 1: por pestaña (proyecto) ──
  const projData=projects.map(p=>{
    const pt=filtered.filter(t=>t.project_id===p.id);
    return{
      name:p.name,color:p.color,
      pending:pt.filter(t=>!t.done&&!(t.deadline&&daysUntil(t.deadline)<0)).length,
      overdue:pt.filter(t=>!t.done&&t.deadline&&daysUntil(t.deadline)<0).length,
      done:pt.filter(t=>t.done).length,
    };
  }).filter(p=>p.pending+p.overdue+p.done>0);

  // ── Chart 2: por hotel/tag ──
  const tagData=tags.map(tg=>{
    const tids=Object.entries(taskTags).filter(([,tgs])=>tgs.includes(tg.id)).map(([tid])=>Number(tid));
    const tt=filtered.filter(t=>tids.includes(t.id));
    return{
      name:tg.name,
      pending:tt.filter(t=>!t.done&&!(t.deadline&&daysUntil(t.deadline)<0)).length,
      overdue:tt.filter(t=>!t.done&&t.deadline&&daysUntil(t.deadline)<0).length,
      done:tt.filter(t=>t.done).length,
    };
  }).filter(t=>t.pending+t.overdue+t.done>0);

  // ── No data ──
  if(!projData.length&&!tagData.length) return"";

  function barChart(data,title){
    if(!data.length)return"";
    const maxVal=Math.max(...data.map(d=>d.pending+d.overdue+d.done),1);
    const BAR_H=28,GAP=10,LABEL_W=130,CHART_W=340,ROW=BAR_H+GAP;
    const svgH=data.length*ROW+20;

    const rows=data.map((d,i)=>{
      const total=d.pending+d.overdue+d.done;
      const pW=Math.round((d.pending/maxVal)*CHART_W);
      const oW=Math.round((d.overdue/maxVal)*CHART_W);
      const dW=Math.round((d.done/maxVal)*CHART_W);
      const y=i*ROW;
      const shortName=d.name.length>18?d.name.slice(0,17)+"…":d.name;
      return`
        <text x="${LABEL_W-8}" y="${y+BAR_H/2+5}" text-anchor="end" font-size="12" fill="#718096" font-family="Georgia,serif">${shortName}</text>
        ${pW>0?`<rect x="${LABEL_W}" y="${y}" width="${pW}" height="${BAR_H}" rx="3" fill="#6B46C1" opacity="0.85"/>`:``}
        ${oW>0?`<rect x="${LABEL_W+pW}" y="${y}" width="${oW}" height="${BAR_H}" rx="3" fill="#E53E3E" opacity="0.85"/>`:``}
        ${dW>0?`<rect x="${LABEL_W+pW+oW}" y="${y}" width="${dW}" height="${BAR_H}" rx="3" fill="#48BB78" opacity="0.85"/>`:``}
        ${total>0?`<text x="${LABEL_W+pW+oW+dW+6}" y="${y+BAR_H/2+5}" font-size="11" fill="#A0AEC0" font-family="Georgia,serif">${total}</text>`:""}
      `;
    }).join("");

    return`
      <div style="display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap">
        <span style="font-size:12px;font-weight:700;color:#6B46C1">● Pendientes</span>
        <span style="font-size:12px;font-weight:700;color:#E53E3E">● Vencidas</span>
        <span style="font-size:12px;font-weight:700;color:#48BB78">● Hechas</span>
      </div>
      <svg width="100%" viewBox="0 0 ${LABEL_W+CHART_W+60} ${svgH}" style="overflow:visible">
        ${rows}
      </svg>`;
  }

  return`
    <div class="dash-section">
      <div class="dash-section-title" style="color:#2D3748"><span style="background:#2D3748"></span>📊 Estadísticas por pestaña</div>
      <div style="background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #E2E8F0;margin-bottom:12px;overflow-x:auto">
        ${barChart(projData,"")}
      </div>
    </div>
    ${tagData.length>0?`
    <div class="dash-section">
      <div class="dash-section-title" style="color:#2D3748"><span style="background:#2D3748"></span>🏷 Estadísticas por hotel</div>
      <div style="background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #E2E8F0;margin-bottom:12px;overflow-x:auto">
        ${barChart(tagData,"")}
      </div>
    </div>`:""}
  `;
}

function renderDashboard(){
  const{tasks,projects}=state;
  const filtered=tasks.filter(t=>taskMatchesHotel(t));
  const overdue  =filtered.filter(t=>!t.done&&t.deadline&&daysUntil(t.deadline)<0);
  const completed=filtered.filter(t=>t.done);
  const upcoming =filtered.filter(t=>!t.done&&t.deadline&&daysUntil(t.deadline)>=0).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const pending  =filtered.filter(t=>!t.done&&!(t.deadline&&daysUntil(t.deadline)<0));

  const projSummary=projects.map(p=>{
    const pt=filtered.filter(t=>t.project_id===p.id);
    const pPend=pt.filter(t=>!t.done&&!(t.deadline&&daysUntil(t.deadline)<0)).length;
    const pDone=pt.filter(t=>t.done).length;
    const pOvr =pt.filter(t=>!t.done&&t.deadline&&daysUntil(t.deadline)<0).length;
    return`<div class="proj-card" style="border-color:${p.color}22;cursor:pointer" data-gotoproject="${p.id}">
      <div class="proj-color-bar" style="background:${p.color}"></div>
      <div>
        <div class="proj-name">${p.name}</div>
        <div class="proj-counts">${pPend} pendientes · ${pDone} hechas${pOvr>0?` · <span style="color:#E53E3E">${pOvr} vencidas</span>`:""}</div>
      </div>
    </div>`;
  }).join("");

  function dashRow(t,showDl=true){
    const pr=PRIORITIES.find(x=>x.id===t.priority);
    const p=proj(t.project_id);
    const dl=dlLabel(t.deadline);
    const tids=state.taskTags[t.id]||[];
    const taskTags=tids.map(tid=>state.tags.find(x=>x.id===tid)).filter(Boolean);
    return`<div class="dash-task" style="cursor:pointer" data-gotoproject="${t.project_id}">
      <div class="dash-task-left">
        <div class="dash-task-name">${t.title}</div>
        <div class="dash-task-meta">
          <span>${p?.name||""}</span>
          ${t.notes?`<span>· ${t.notes}</span>`:""}
          ${taskTags.map(tg=>`<span class="tag-pill">${tg.name}</span>`).join("")}
        </div>
      </div>
      <div class="dash-task-right">
        <span class="dash-badge" style="background:${pr.bg};color:${pr.color};border-color:${pr.border}">${pr.emoji} ${pr.label}</span>
        ${showDl&&t.deadline?`<span class="dash-badge" style="background:${dl?.urgent?"#FFF5F5":"#F7FAFC"};color:${dl?.color||"#718096"};border-color:${dl?.urgent?"#FEB2B2":"#E2E8F0"}">📅 ${fmtDate(t.deadline)}</span>`:""}
      </div>
    </div>`;
  }

  return`
    <div class="dash-grid">
      <div class="stat-card" style="background:#F5F3FF;border-color:#DDD6FE"><div class="stat-num" style="color:#6B46C1">${pending.length}</div><div class="stat-label" style="color:#6B46C1">Pendientes</div></div>
      <div class="stat-card" style="background:#FFF5F5;border-color:#FEB2B2"><div class="stat-num" style="color:#E53E3E">${overdue.length}</div><div class="stat-label" style="color:#E53E3E">Vencidas</div></div>
      <div class="stat-card" style="background:#F0FFF4;border-color:#9AE6B4"><div class="stat-num" style="color:#276749">${completed.length}</div><div class="stat-label" style="color:#276749">Completadas</div></div>
    </div>

    <div class="proj-summary">${projSummary}</div>

    ${renderCharts(filtered)}

    ${overdue.length>0?`
    <div class="dash-section">
      <div class="dash-section-title" style="color:#E53E3E"><span style="background:#E53E3E"></span>⚠️ Vencidas (${overdue.length})</div>
      ${overdue.map(t=>dashRow(t)).join("")}
    </div>`:""}

    <div class="dash-section">
      <div class="dash-section-title" style="color:#DD6B20"><span style="background:#DD6B20"></span>📅 Próximas con fecha límite</div>
      ${upcoming.length>0?upcoming.slice(0,8).map(t=>dashRow(t)).join(""):`<div class="dash-empty">Sin tareas con fecha límite próxima</div>`}
    </div>

    <div class="dash-section">
      <div class="dash-section-title" style="color:#276749"><span style="background:#276749"></span>✅ Últimas completadas</div>
      ${completed.length>0?completed.slice(-6).reverse().map(t=>`
        <div class="dash-task" style="opacity:0.7">
          <div class="dash-task-left">
            <div class="dash-task-name" style="text-decoration:line-through;color:#A0AEC0">${t.title}</div>
            <div class="dash-task-meta"><span>${proj(t.project_id)?.name||""}</span></div>
          </div>
          <div class="dash-task-right"><span class="dash-badge" style="background:#F0FFF4;color:#276749;border-color:#9AE6B4">✓ Hecha</span></div>
        </div>`).join(""):`<div class="dash-empty">Ninguna tarea completada aún</div>`}
    </div>`;
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.addEventListener("click",function(e){
  const t=e.target;

  const gotoProj=t.closest("[data-gotoproject]");
  if(gotoProj){setProject(Number(gotoProj.dataset.gotoproject));setView("tasks");return;}

  const viewBtn=t.closest("[data-view]");
  if(viewBtn){setView(viewBtn.dataset.view);return;}

  const projBtn=t.closest("[data-project]");
  if(projBtn&&!t.closest("[data-editproj]")){setProject(Number(projBtn.dataset.project));return;}

  const editProjBtn=t.closest("[data-editproj]");
  if(editProjBtn){e.stopPropagation();openEditProj(Number(editProjBtn.dataset.editproj));return;}

  if(t.closest("[data-action='newproj']")){toggleNewProj();return;}
  if(t.closest("[data-filter='pending']")){setFilter("pending");return;}
  if(t.closest("[data-filter='overdue']")){setFilter("overdue");return;}
  if(t.closest("[data-filter='done']"))   {setFilter("done");return;}

  const delProj=t.closest("[data-deleteproj]");
  if(delProj){deleteProject(Number(delProj.dataset.deleteproj));return;}

  if(t.closest("[data-action='addtask']")){openTaskForm();return;}

  const togDone=t.closest("[data-toggledone]");
  if(togDone){toggleDone(Number(togDone.dataset.toggledone));return;}

  const pddToggle=t.closest("[data-pdd]");
  if(pddToggle&&!t.closest("[data-setpriority]")){togglePDD(Number(pddToggle.dataset.pdd));return;}

  const setPri=t.closest("[data-setpriority]");
  if(setPri){setPriority(Number(setPri.dataset.taskid),setPri.dataset.setpriority);return;}

  const editT=t.closest("[data-edittask]");
  if(editT){openEditTask(Number(editT.dataset.edittask));return;}

  const delT=t.closest("[data-deletetask]");
  if(delT){deleteTask(Number(delT.dataset.deletetask));return;}

  if(t.closest("[data-action='openconfig']")) {openConfig();return;}
  if(t.closest("[data-action='closeconfig']")){closeConfig();return;}
  if(t.closest("[data-action='saveconfig']")) {saveTgConfig();return;}

  if(t.closest("[data-action='opentagmgr']")) {state.showTagManager=true;render();return;}
  if(t.closest("[data-action='closetagmgr']")){state.showTagManager=false;render();return;}
  if(t.closest("[data-action='addtag']"))     {addTag();return;}

  const delTag=t.closest("[data-deletetag]");
  if(delTag){deleteTag(Number(delTag.dataset.deletetag));return;}

  if(t.closest("[data-action='saveeditproj']"))  {saveEditProj();return;}
  if(t.closest("[data-action='canceleditproj']")){state.showEditProj=null;render();return;}
  if(t.closest("[data-action='addproject']"))    {addProject();return;}
  if(t.closest("[data-action='cancelnewproj']")) {state.showProjForm=false;render();return;}

  if(t.closest("[data-action='saveedittask']"))  {saveEditTask();return;}
  if(t.closest("[data-action='canceledittask']")){state.showEditTask=null;render();return;}
  if(t.closest("[data-action='cleardeadline']")) {state.editTask.deadline="";render();return;}
  if(t.closest("[data-action='addtaskconfirm']")){addTask();return;}
  if(t.closest("[data-action='cancelnewtask']")) {state.showTaskForm=false;render();return;}

  const colorBtn=t.closest("[data-color]");
  if(colorBtn){
    const target=colorBtn.dataset.target;
    if(target==="editproj"){state.editProj.color=colorBtn.dataset.color;render();}
    if(target==="newproj") {state.newProj.color=colorBtn.dataset.color;render();}
    return;
  }

  const formPri=t.closest("[data-formpriority]");
  if(formPri){
    const target=formPri.dataset.target;
    if(target==="newtask") {state.newTask.priority=formPri.dataset.formpriority;render();}
    if(target==="edittask"){state.editTask.priority=formPri.dataset.formpriority;render();}
    return;
  }

  // Tag toggle in forms
  const tagToggle=t.closest("[data-tagtoggle]");
  if(tagToggle){
    const tid=Number(tagToggle.dataset.tagtoggle);
    const target=tagToggle.dataset.tagtarget;
    const arr=target==="newtask"?state.newTask.tagIds:state.editTask.tagIds;
    const idx=arr.indexOf(tid);
    if(idx>-1)arr.splice(idx,1);else arr.push(tid);
    render();return;
  }

  // Hotel filter
  const hotelBtn=t.closest("[data-hotelfilter]");
  if(hotelBtn){
    const val=Number(hotelBtn.dataset.hotelfilter);
    state.hotelFilter=val===0?null:val;
    render();return;
  }

  const toastClose=t.closest("[data-dismisstoast]");
  if(toastClose){dismissToast(toastClose.dataset.dismisstoast);return;}
});

// ── State helpers ─────────────────────────────────────────────────────────────
function setView(v){state.view=v;state.showTaskForm=false;state.showEditTask=null;render();}
function setProject(id){state.activeProject=id;state.taskFilter="pending";state.showTaskForm=false;state.showEditTask=null;render();}
function toggleNewProj(){state.showProjForm=!state.showProjForm;state.showEditProj=null;render();}
function setFilter(f){state.taskFilter=f;render();}
function openTaskForm(){state.showTaskForm=true;state.newTask={title:"",priority:"medium",notes:"",deadline:"",tagIds:[]};render();}
function openConfig(){state.showConfig=true;render();}
function closeConfig(){state.showConfig=false;render();}
function dismissToast(id){state.notifications=state.notifications.filter(n=>String(n.id)!==String(id));renderToasts();}
function togglePDD(id){const el=document.getElementById(`pdd-${id}`);if(el)el.style.display=el.style.display==="none"||!el.style.display?"block":"none";}
function openEditProj(id){const p=proj(id);state.showEditProj=id;state.editProj={name:p.name,color:p.color};state.showProjForm=false;render();}
function openEditTask(id){
  const t=state.tasks.find(x=>x.id===id);
  state.showEditTask=id;
  state.editTask={title:t.title,priority:t.priority,notes:t.notes||"",deadline:t.deadline||"",tagIds:[...(state.taskTags[id]||[])]};
  render();
}

// ── DB actions ────────────────────────────────────────────────────────────────
async function addProject(){
  const{name,color}=state.newProj;if(!name.trim())return;
  const data=await sbInsert("projects",{name:name.trim(),color});
  state.projects.push(data);state.activeProject=data.id;
  state.newProj={name:"",color:PROJECT_COLORS[0]};state.showProjForm=false;render();
}
async function deleteProject(id){
  if(!confirm("¿Eliminar este proyecto y todas sus tareas?"))return;
  await sbDelete("projects",id);
  state.projects=state.projects.filter(p=>p.id!==id);
  state.tasks=state.tasks.filter(t=>t.project_id!==id);
  state.activeProject=state.projects[0]?.id||null;render();
}
async function saveEditProj(){
  const{showEditProj,editProj}=state;if(!editProj.name.trim())return;
  await sbUpdate("projects",showEditProj,{name:editProj.name.trim(),color:editProj.color});
  state.projects=state.projects.map(p=>p.id===showEditProj?{...p,name:editProj.name.trim(),color:editProj.color}:p);
  state.showEditProj=null;render();
}
async function addTask(){
  const{newTask,activeProject}=state;if(!newTask.title.trim())return;
  const data=await sbInsert("tasks",{project_id:activeProject,title:newTask.title.trim(),notes:newTask.notes.trim(),priority:newTask.priority,deadline:newTask.deadline||null,done:false});
  state.tasks.push(data);
  // Save tags
  state.taskTags[data.id]=newTask.tagIds;
  if(newTask.tagIds.length>0){
    await sbInsertMany("task_tags",newTask.tagIds.map(tid=>({task_id:data.id,tag_id:tid})));
  }
  state.newTask={title:"",priority:"medium",notes:"",deadline:"",tagIds:[]};
  state.showTaskForm=false;render();
}
async function toggleDone(id){
  const t=state.tasks.find(x=>x.id===id);
  await sbUpdate("tasks",id,{done:!t.done});
  state.tasks=state.tasks.map(x=>x.id===id?{...x,done:!x.done}:x);render();
}
async function deleteTask(id){
  await sbDelete("tasks",id);
  state.tasks=state.tasks.filter(t=>t.id!==id);
  delete state.taskTags[id];render();
}
async function setPriority(id,priority){
  await sbUpdate("tasks",id,{priority});
  state.tasks=state.tasks.map(t=>t.id===id?{...t,priority}:t);render();
}
async function saveEditTask(){
  const{showEditTask,editTask}=state;if(!editTask.title.trim())return;
  await sbUpdate("tasks",showEditTask,{title:editTask.title.trim(),priority:editTask.priority,notes:editTask.notes.trim(),deadline:editTask.deadline||null});
  // Update tags
  await sbDeleteWhere("task_tags","task_id",showEditTask);
  if(editTask.tagIds.length>0){
    await sbInsertMany("task_tags",editTask.tagIds.map(tid=>({task_id:showEditTask,tag_id:tid})));
  }
  state.tasks=state.tasks.map(t=>t.id===showEditTask?{...t,...editTask,deadline:editTask.deadline||null}:t);
  state.taskTags[showEditTask]=[...editTask.tagIds];
  state.showEditTask=null;render();
}
async function addTag(){
  const name=state.newTagName.trim();if(!name)return;
  const data=await sbInsert("tags",{name});
  state.tags.push(data);state.newTagName="";render();
}
async function deleteTag(id){
  if(!confirm("¿Eliminar este tag?"))return;
  await sbDelete("tags",id);
  state.tags=state.tags.filter(t=>t.id!==id);
  // Remove from local taskTags
  Object.keys(state.taskTags).forEach(tid=>{
    state.taskTags[tid]=state.taskTags[tid].filter(x=>x!==id);
  });
  if(state.hotelFilter===id)state.hotelFilter=null;
  render();
}
async function saveTgConfig(){
  localStorage.setItem("tg-token",state.tgToken);
  localStorage.setItem("tg-chatid",state.tgChatId);
  state.showConfig=false;
  await sendTelegram("✅ ¡Notificaciones de tareas configuradas correctamente!");
  render();
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async()=>{
  try{
    const[{data:projs},{data:tsks},{data:tgs},{data:ttags}]=await Promise.all([
      sbGet("projects").then(d=>({data:d})),
      sbGet("tasks").then(d=>({data:d})),
      sbGet("tags").then(d=>({data:d})),
      fetch(`${SUPABASE_URL}/rest/v1/task_tags?select=task_id,tag_id`,{headers}).then(r=>r.json()).then(d=>({data:Array.isArray(d)?d:[]})),
    ]);
    state.projects=Array.isArray(projs)?projs:[];
    state.tasks=Array.isArray(tsks)?tsks:[];
    state.tags=Array.isArray(tgs)?tgs:[];
    const safeTtags=Array.isArray(ttags)?ttags:[];
    safeTtags.forEach(({task_id,tag_id})=>{
      if(!state.taskTags[task_id])state.taskTags[task_id]=[];
      state.taskTags[task_id].push(tag_id);
    });
    state.activeProject=projs?.[0]?.id||null;
    render();checkDeadlines();
  }catch(e){
    document.getElementById("app").innerHTML=`<div class="loading" style="color:#E53E3E"><div style="font-size:32px">⚠️</div><p>Error al conectar con Supabase</p><p style="font-size:12px;color:#718096">${e.message}</p></div>`;
  }
})();
</script>
